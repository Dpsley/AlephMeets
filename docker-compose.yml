services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - livekit-redis:/data

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --config /etc/livekit.yaml --node-ip 127.0.0.1
    depends_on:
      - redis
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

volumes:
  livekit-redis:
