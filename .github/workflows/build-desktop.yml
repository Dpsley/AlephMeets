name: Build desktop

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

concurrency:
  group: desktop-release-${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'main' || github.ref }}
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      publish: ${{ steps.version.outputs.publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          publish=false

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="$GITHUB_REF_NAME"
            publish=true
          elif [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == "refs/heads/main" ]]; then
            git fetch --force --tags origin
            tag="$(git tag --points-at "$GITHUB_SHA" --list 'v[0-9]*' --sort=-v:refname | head -n 1)"
            if [[ -z "$tag" ]]; then
              latest="$(git tag --list 'v[0-9]*' --sort=-v:refname | head -n 1)"
              latest="${latest:-v0.0.0}"
              IFS='.' read -r major minor patch <<< "${latest#v}"
              tag="v${major}.${minor}.$((10#$patch + 1))"
            fi
            publish=true
          else
            tag="v$(node -p "require('./apps/desktop/package.json').version")"
          fi

          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"

  verify:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://aleph_meets:aleph_meets_test@127.0.0.1:5432/aleph_meets
      IDP_BASE_URL: https://idp.invalid.test/id
      IDP_ENCODE_KEY: test-encode-key
      IDP_DECODE_KEY: test-decode-key
      IDP_ACCESS_KEY: test-access-key
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aleph_meets
          POSTGRES_PASSWORD: aleph_meets_test
          POSTGRES_DB: aleph_meets
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aleph_meets -d aleph_meets"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run db:seed
      - run: npm run typecheck
      - run: npm test

  package-windows:
    needs: [version, verify]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Set release version
        run: npm version "${{ needs.version.outputs.version }}" --workspace @aleph/desktop --no-git-tag-version --allow-same-version
      - run: npm run dist:win -w @aleph/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          VITE_API_URL: https://meets-api.alephtrade.com
      - uses: actions/upload-artifact@v4
        with:
          name: AlephMeets-Windows
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest.yml

  package-macos:
    needs: [version, verify]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Set release version
        run: npm version "${{ needs.version.outputs.version }}" --workspace @aleph/desktop --no-git-tag-version --allow-same-version
      - run: npm run dist:mac -w @aleph/desktop
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.MAC_CSC_NAME }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VITE_API_URL: https://meets-api.alephtrade.com
      - name: Verify macOS architectures
        shell: bash
        run: |
          binary="apps/desktop/release/mac-universal/AlephMeets.app/Contents/MacOS/AlephMeets"
          if [[ ! -f "$binary" ]]; then
            echo "::error ::macOS universal app binary was not produced"
            find apps/desktop/release -path '*/Contents/MacOS/AlephMeets' -type f -print
            exit 1
          fi
          archs="$(lipo -archs "$binary")"
          echo "$binary: $archs"
          if [[ "$archs" != *"x86_64"* || "$archs" != *"arm64"* ]]; then
            echo "::error ::macOS release must be universal, got: $archs"
            exit 1
          fi
          codesign --verify --deep --strict "apps/desktop/release/mac-universal/AlephMeets.app"
      - uses: actions/upload-artifact@v4
        with:
          name: AlephMeets-macOS
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest-mac.yml

  release:
    if: needs.version.outputs.publish == 'true'
    needs: [version, verify, package-windows, package-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.version.outputs.tag }}
          RELEASE_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber --repo "${{ github.repository }}"
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --target "$RELEASE_SHA" \
              --generate-notes \
              --repo "${{ github.repository }}" \
              --title "AlephMeets $RELEASE_TAG"
          fi
