name: Build desktop

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://aleph_meets:aleph_meets_test@127.0.0.1:5432/aleph_meets
      IDP_BASE_URL: https://idp.invalid.test/id
      IDP_ENCODE_KEY: test-encode-key
      IDP_DECODE_KEY: test-decode-key
      IDP_ACCESS_KEY: test-access-key
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aleph_meets
          POSTGRES_PASSWORD: aleph_meets_test
          POSTGRES_DB: aleph_meets
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aleph_meets -d aleph_meets"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run db:seed
      - run: npm run typecheck
      - run: npm test

  package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist:win -w @aleph/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          VITE_API_URL: https://meets-api.alephtrade.com
      - uses: actions/upload-artifact@v4
        with:
          name: AlephMeets-Windows
          path: apps/desktop/release/*.exe

  package-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist:mac -w @aleph/desktop
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VITE_API_URL: https://meets-api.alephtrade.com
      - name: Verify macOS architectures
        run: |
          count=0
          for binary in $(find apps/desktop/release -path '*/Contents/MacOS/AlephMeets' -type f); do
            echo "$binary: $(lipo -archs "$binary")"
            codesign --verify --deep --strict "$(dirname "$(dirname "$(dirname "$binary")")")"
            count=$((count + 1))
          done
          test "$count" -eq 2
      - uses: actions/upload-artifact@v4
        with:
          name: AlephMeets-macOS
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
