name: Build desktop

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist:win -w @aleph/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          VITE_API_URL: ${{ vars.VITE_API_URL }}
      - uses: actions/upload-artifact@v4
        with:
          name: AlephMeets-Windows
          path: apps/desktop/release/*.exe

  package-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist:mac -w @aleph/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          VITE_API_URL: ${{ vars.VITE_API_URL }}
      - uses: actions/upload-artifact@v4
        with:
          name: AlephMeets-macOS
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
