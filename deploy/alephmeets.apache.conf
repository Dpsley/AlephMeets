<VirtualHost *:80>
    ServerName meets-api.alephtrade.com

    ProxyRequests Off
    ProxyPreserveHost On
    LimitRequestBody 104857600

    ProxyPass / http://127.0.0.1:4100/ upgrade=websocket timeout=3600
    ProxyPassReverse / http://127.0.0.1:4100/

    ErrorLog ${APACHE_LOG_DIR}/alephmeets-api-error.log
    CustomLog ${APACHE_LOG_DIR}/alephmeets-api-access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName meets-livekit.alephtrade.com

    ProxyRequests Off
    ProxyPreserveHost On

    ProxyPass / http://127.0.0.1:7880/ upgrade=websocket timeout=3600
    ProxyPassReverse / http://127.0.0.1:7880/

    ErrorLog ${APACHE_LOG_DIR}/alephmeets-livekit-error.log
    CustomLog ${APACHE_LOG_DIR}/alephmeets-livekit-access.log combined
</VirtualHost>
