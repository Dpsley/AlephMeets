name: alephmeets

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks: [backend]

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}"
    depends_on:
      - redis
    ports:
      - "7881:7881/tcp"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./deploy/livekit.production.yaml:/etc/livekit.yaml:ro
    networks: [backend]

  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    env_file: .env.production
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 4100
    depends_on:
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started
    volumes:
      - uploads-data:/app/uploads
    networks: [backend]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      API_DOMAIN: ${API_DOMAIN:?API_DOMAIN is required}
      LIVEKIT_DOMAIN: ${LIVEKIT_DOMAIN:?LIVEKIT_DOMAIN is required}
    depends_on:
      api:
        condition: service_healthy
      livekit:
        condition: service_started
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [backend]

networks:
  backend:

volumes:
  postgres-data:
  redis-data:
  uploads-data:
  caddy-data:
  caddy-config:
